# Polymarket 校准交易系统 v0.1 —— 纸面模式配置
# 硬性要求:全程无真实下单;所有密钥必须留空,任何密钥非空则程序拒绝启动。
#
# 首跑核对结果(2025-12-19,官方 API 实测,详见 PR 讨论):
#   - Bitcoin Up or Down 系列实际是 5 分钟一档(不是最初以为的 15 分钟)
#   - 官方规则原文:"结束价 >= 开始价 判 Up,否则判 Down" → 平局(价格不变)算 Up
#   - 结算依据 Chainlink BTC/USD 数据流,不是 Binance 现货(故 Binance 只做官方
#     结果未出时的临时兜底,报表 resolution_source 字段区分两者)

[mode]
paper = true                     # v0.1 不存在真实下单代码路径,此项必须为 true

[keys]                           # 纸面模式:全部留空
polymarket_private_key = ""
polymarket_api_key = ""
polymarket_api_secret = ""
polymarket_api_passphrase = ""

[bankroll]
initial_usdc = 10000.0           # 虚拟资金
kelly_multiplier = 0.25          # 1/4 Kelly
max_stake_fraction = 0.02        # 单笔(本金+费)≤ 虚拟资金 2%,即单笔 CVaR ≤ 2%

[strategy]
edge_threshold = 0.05            # |own_prob − 市场卖一价| > 5 个百分点才记假想单
decision_interval_s = 15         # 预测快照间隔(秒);5 分钟市场,间隔按比例缩短
warmup_s = 15                    # 区间开始后的热身期,不记快照不开仓
cutoff_s = 10                    # 区间结束前 N 秒停止开新仓
max_trades_per_market = 1        # 每个市场区间最多一笔假想单
min_stake_usdc = 1.0             # 低于该本金不记单
tie_resolves_down = false        # 官方规则:平局(收盘价==开盘价)算 Up,不是 Down

[signal]
vol_halflife_s = 100.0           # EWMA 已实现波动率半衰期(秒);约为市场时长的 1/3
min_sigma = 1e-6
prob_clamp = 0.005               # own_prob 裁剪到 [0.005, 0.995]

[fees]
# 兜底 taker 费率(基点);实际优先读取 CLOB 市场对象的 taker_base_fee 字段。
# 费用公式: fee = bps/10000 × min(p, 1−p) × shares。首跑前对照官网核对。
taker_fee_bps = 200

[data]
db_path = "data/paper.db"

[binance]
ws_url = "wss://stream.binance.com:9443/ws/btcusdt@trade"
rest_url = "https://api.binance.com"
symbol = "BTCUSDT"

[polymarket]
gamma_url = "https://gamma-api.polymarket.com"
clob_rest_url = "https://clob.polymarket.com"
clob_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
series_title_regex = "Bitcoin Up or Down"   # Gamma 自动发现市场用,已对照真实标题验证
interval_minutes = 5                        # 实测确认:5 分钟一档
book_poll_fallback_s = 5
# 自动发现失败时手动钉死当前市场(逃生口),留空则自动发现
override_condition_id = ""
override_token_id_up = ""
override_token_id_down = ""
